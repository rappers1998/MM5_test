data:
  synth_split: mm5_ivf/data/processed/splits/split_synth_easy.json

runtime:
  seed: 42
  device: cpu
  image_size: [160, 128]
  batch_size: 4
  train_limit: 16
  val_limit: 8

training:
  epochs: 1
  lr: 0.0001
  pdg_n: 2
  w1: 5.0
  w2: 1.0
  smooth_weight: 0.02

outputs:
  root: mm5_ivf/outputs/checkpoints/bsr_v2_smoke
